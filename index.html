<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Website</title>
    <style>
        /* CSS styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #content {
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="content">
        <h1>Welcome!</h1>
        <p>This is a sample webpage.</p>
        <button id="myButton">Click me</button>
    </div>

    <script>
        // JavaScript code
        document.getElementById('myButton').addEventListener('click', function() {
            alert('Button clicked!');
            // You can add more functionality here
        });
    </script>
</body>
</html>
